<!-- templates/index.html -->
<!-- UI layout designed with Claude AI based on reference logo, color palette, and backend app function. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWizard</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/book_wizard_ico.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='1') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <img src="{{ url_for('static', filename='images/book_wizard_logo.png') }}" alt="BookWizard" class="logo">
            <p class="tagline">Bookstore Inventory Manager</p>
        </div>
    </header>

    <!-- Main -->
    <main class="main-content">

        <!-- Tab Nav -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="browse">Browse Books</button>
            <button class="tab-btn" data-tab="add">Add Book</button>
            <button class="tab-btn" data-tab="manage">Update / Delete</button>
        </nav>

        <!-- Toast -->
        <div id="toast" class="toast hidden"></div>

        <!-- TAB: BROWSE -->
        <section id="tab-browse" class="tab-panel active">
            <div class="section-header">
                <h2>All Books</h2>
                <button class="btn-primary" id="refreshBtn">↻ Refresh</button>
            </div>

            <div id="books-grid" class="books-grid">
                <p class="loading-msg">Loading books…</p>
            </div>
        </section>

        <!-- TAB: ADD -->
        <section id="tab-add" class="tab-panel hidden">
            <h2>Add a New Book</h2>
            <form id="addForm" class="book-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Title <span class="req">*</span></label>
                        <input type="text" name="title" required placeholder="e.g. The Great Gatsby">
                    </div>
                    <div class="form-group">
                        <label>Author <span class="req">*</span></label>
                        <input type="text" name="author" required placeholder="First Last">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Published Year <span class="req">*</span></label>
                        <input type="number" name="published_year" required placeholder="e.g. 1925" min="1000" max="2099">
                    </div>
                    <div class="form-group">
                        <label>Price ($) <span class="req">*</span></label>
                        <input type="number" name="price" required placeholder="e.g. 14.99" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label>Inventory Qty <span class="req">*</span></label>
                        <input type="number" name="inventory" required placeholder="e.g. 50" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN <span class="optional">(optional)</span></label>
                        <input type="text" name="isbn" placeholder="e.g. 978-3-16-148410-0">
                    </div>
                    <div class="form-group">
                        <label>Location <span class="optional">(optional)</span></label>
                        <input type="text" name="location" placeholder="e.g. Warehouse A">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Add Book</button>
                    <button type="reset" class="btn-ghost">Clear</button>
                </div>
            </form>
        </section>

        <!-- TAB: MANAGE -->
        <section id="tab-manage" class="tab-panel hidden">
            <h2>Update or Delete a Book</h2>

            <!-- Lookup -->
            <div class="lookup-bar">
                <input type="number" id="lookupId" placeholder="Enter Book ID…" min="1">
                <button class="btn-primary" id="lookupBtn">Look Up</button>
            </div>

            <!-- Book preview card -->
            <div id="manage-preview" class="manage-preview hidden">
                <div class="preview-card">
                    <div class="preview-info">
                        <h3 id="prev-title"></h3>
                        <p id="prev-meta"></p>
                    </div>
                    <button class="btn-danger" id="deleteBtn">Delete Book</button>
                </div>

                <!-- Update form -->
                <form id="updateForm" class="book-form update-form">
                    <p class="form-note">Leave fields blank to keep existing values.</p>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="New title">
                        </div>
                        <div class="form-group">
                            <label>Published Year</label>
                            <input type="number" name="published_year" placeholder="New year" min="1000" max="2099">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Price ($)</label>
                            <input type="number" name="price" placeholder="New price" step="0.01" min="0">
                        </div>
                        <div class="form-group">
                            <label>Inventory Qty</label>
                            <input type="number" name="inventory" placeholder="New quantity" min="0">
                        </div>
                        <div class="form-group">
                            <label>ISBN</label>
                            <input type="text" name="isbn" placeholder="New ISBN">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" name="location" placeholder="New location">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 BookWizard </p>
    </footer>

<script>
// Helpers
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    setTimeout(() => t.className = 'toast hidden', 3500);
}

async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || json.error || 'Request failed');
    return json;
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => { p.classList.add('hidden'); p.classList.remove('active'); });
        btn.classList.add('active');
        const panel = document.getElementById('tab-' + btn.dataset.tab);
        panel.classList.remove('hidden');
        panel.classList.add('active');
    });
});

// Browse / GET all
function renderBooks(books) {
    const grid = document.getElementById('books-grid');
    if (!books.length) { grid.innerHTML = '<p class="loading-msg">No books found.</p>'; return; }
    grid.innerHTML = books.map(b => `
        <div class="book-card">
            <div class="book-spine"></div>
            <div class="book-body">
                <span class="book-id">ID ${b.book_id}</span>
                <h3 class="book-title">${b.title}</h3>
                <p class="book-author">${b.author || 'Unknown'}</p>
                <div class="book-meta">
                    <span>${b.published_year}</span>
                    <span class="price">$${parseFloat(b.price).toFixed(2)}</span>
                </div>
                <p class="book-isbn">ISBN ${b.isbn || 'Unknown'}</p>
                <p class="book-location">${b.location}</p>
                <div class="book-stock ${b.inventory > 0 ? 'in-stock' : 'out-stock'}">
                    ${b.inventory > 0 ? `${b.inventory} in stock` : 'Out of stock'}
                </div>
            </div>
        </div>
    `).join('');
}

async function loadBooks() {
    document.getElementById('books-grid').innerHTML = '<p class="loading-msg">Loading…</p>';
    try {
        const books = await apiFetch('/books');
        renderBooks(books);
    } catch(e) { showToast(e.message, 'error'); }
}

document.getElementById('refreshBtn').addEventListener('click', loadBooks);
loadBooks(); // initial load

// Add / POST
document.getElementById('addForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {};
    fd.forEach((v, k) => { if (v !== '') body[k] = isNaN(v) || k === 'title' || k === 'author' || k === 'isbn' ? v : Number(v); });
    try {
        await apiFetch('/books', { method: 'POST', body: JSON.stringify(body) });
        showToast('Book added successfully!');
        e.target.reset();
    } catch(e) { showToast(e.message, 'error'); }
});

// Manage: lookup
let currentBookId = null;

document.getElementById('lookupBtn').addEventListener('click', async () => {
    const id = document.getElementById('lookupId').value;
    if (!id) return showToast('Enter a Book ID', 'error');
    try {
        const book = await apiFetch(`/books/${id}`);
        currentBookId = book.book_id;
        document.getElementById('prev-title').textContent = book.title;
        document.getElementById('prev-meta').textContent =
            `${book.author || 'Unknown'} · ${book.published_year} · $${parseFloat(book.price).toFixed(2)} · ISBN ${book.isbn} · ${book.location} · ${book.inventory} in stock`;
        document.getElementById('manage-preview').classList.remove('hidden');
    } catch(e) { showToast(e.message, 'error'); document.getElementById('manage-preview').classList.add('hidden'); }
});

// Update / PATCH
document.getElementById('updateForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!currentBookId) return;
    const fd = new FormData(e.target);
    const body = {};
    fd.forEach((v, k) => {
        if (v !== '') body[k] = (k === 'title' || k === 'isbn' || k === 'location') ? v : Number(v);
    });
    if (!Object.keys(body).length) return showToast('Nothing to update', 'error');
    try {
        await apiFetch(`/books/${currentBookId}`, { method: 'PATCH', body: JSON.stringify(body) });
        showToast('Book updated!');
        e.target.reset();
        document.getElementById('manage-preview').classList.add('hidden');
    } catch(e) { showToast(e.message, 'error'); }
});

// Delete
document.getElementById('deleteBtn').addEventListener('click', async () => {
    if (!currentBookId) return;
    if (!confirm(`Delete book ID ${currentBookId}? This cannot be undone.`)) return;
    try {
        await apiFetch(`/books/${currentBookId}`, { method: 'DELETE' });
        showToast('Book deleted.');
        document.getElementById('manage-preview').classList.add('hidden');
        document.getElementById('lookupId').value = '';
        currentBookId = null;
    } catch(e) { showToast(e.message, 'error'); }
});
</script>
</body>
</html>
